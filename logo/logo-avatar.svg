<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- 背景渐变 -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a2332;stop-opacity:1" />
    </linearGradient>
    <!-- 绿色辉光 -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- 扫描线 -->
    <pattern id="scanlines" x="0" y="0" width="512" height="4" patternUnits="userSpaceOnUse">
      <rect x="0" y="0" width="512" height="2" fill="rgba(0,0,0,0.12)"/>
    </pattern>
    <!-- 外圈辉光 -->
    <filter id="outerGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- 主背景 -->
  <rect x="0" y="0" width="512" height="512" rx="80" ry="80" fill="url(#bgGrad)"/>

  <!-- 扫描线覆盖层 -->
  <rect x="0" y="0" width="512" height="512" rx="80" ry="80" fill="url(#scanlines)" opacity="0.5"/>

  <!-- 外圈边框 -->
  <rect x="12" y="12" width="488" height="488" rx="70" ry="70"
        fill="none" stroke="#00ff41" stroke-width="2" stroke-opacity="0.35"/>

  <!-- 内圈装饰框 -->
  <rect x="28" y="28" width="456" height="456" rx="58" ry="58"
        fill="none" stroke="#00ff41" stroke-width="0.8" stroke-opacity="0.15"/>

  <!-- 四角装饰 L 型 -->
  <!-- 左上 -->
  <polyline points="28,68 28,28 68,28" fill="none" stroke="#00ff41" stroke-width="3" stroke-opacity="0.7" stroke-linecap="square"/>
  <!-- 右上 -->
  <polyline points="444,28 484,28 484,68" fill="none" stroke="#00ff41" stroke-width="3" stroke-opacity="0.7" stroke-linecap="square"/>
  <!-- 左下 -->
  <polyline points="28,444 28,484 68,484" fill="none" stroke="#00ff41" stroke-width="3" stroke-opacity="0.7" stroke-linecap="square"/>
  <!-- 右下 -->
  <polyline points="444,484 484,484 484,444" fill="none" stroke="#00ff41" stroke-width="3" stroke-opacity="0.7" stroke-linecap="square"/>

  <!-- 顶部标题栏 -->
  <rect x="28" y="52" width="456" height="36" rx="6" ry="6" fill="#0d1a0d" opacity="0.8"/>
  <!-- 三个控制圆点 -->
  <circle cx="56" cy="70" r="7" fill="#ff5f57"/>
  <circle cx="78" cy="70" r="7" fill="#febc2e"/>
  <circle cx="100" cy="70" r="7" fill="#28c840"/>
  <!-- 标题栏文字 -->
  <text x="256" y="75" text-anchor="middle"
        font-family="'Courier New', monospace"
        font-size="13" fill="#4a9e5c" letter-spacing="2">tui-agent — terminal session</text>

  <!-- 终端屏幕图标区域 -->
  <rect x="60" y="112" width="130" height="96" rx="6" ry="6"
        fill="#0a1a0a" stroke="#00ff41" stroke-width="2" stroke-opacity="0.7"/>
  <!-- 屏幕内显示区 -->
  <rect x="70" y="122" width="110" height="76" rx="3" ry="3" fill="#001400"/>

  <!-- 屏幕内终端内容 -->
  <text x="76" y="140" font-family="'Courier New', monospace" font-size="11" fill="#00ff41" filter="url(#glow)">$ tui-agent start</text>
  <text x="76" y="156" font-family="'Courier New', monospace" font-size="11" fill="#39d353">&gt; session ready</text>
  <text x="76" y="172" font-family="'Courier New', monospace" font-size="11" fill="#00ff41">&gt; capture screen</text>
  <text x="76" y="188" font-family="'Courier New', monospace" font-size="11" fill="#2d9e4a">&gt; type command</text>
  <!-- 光标 -->
  <rect x="76" y="191" width="8" height="11" fill="#00ff41" opacity="0.9"/>

  <!-- 屏幕底座 -->
  <rect x="117" y="208" width="26" height="8" rx="2" fill="#1a3a1a" stroke="#00ff41" stroke-width="1" stroke-opacity="0.5"/>
  <rect x="95" y="216" width="60" height="6" rx="3" fill="#1a3a1a" stroke="#00ff41" stroke-width="1" stroke-opacity="0.5"/>

  <!-- 连接箭头 -->
  <line x1="194" y1="160" x2="222" y2="160" stroke="#00ff41" stroke-width="2" stroke-opacity="0.6" stroke-dasharray="4,3"/>
  <polygon points="222,154 234,160 222,166" fill="#00ff41" opacity="0.7"/>

  <!-- 主文字 TUI -->
  <text x="256" y="220"
        text-anchor="middle"
        font-family="'Courier New', monospace"
        font-size="96" font-weight="bold"
        fill="#00ff41"
        filter="url(#glow)"
        letter-spacing="6">TUI</text>

  <!-- 分隔线 -->
  <line x1="80" y1="242" x2="432" y2="242" stroke="#00ff41" stroke-width="1.5" stroke-opacity="0.4"/>

  <!-- 副文字 USE -->
  <text x="256" y="320"
        text-anchor="middle"
        font-family="'Courier New', monospace"
        font-size="96" font-weight="bold"
        fill="#00ff41"
        filter="url(#glow)"
        letter-spacing="6">USE</text>

  <!-- 副标题 -->
  <text x="256" y="366"
        text-anchor="middle"
        font-family="'Courier New', monospace"
        font-size="16" fill="#4a9e5c" letter-spacing="5">TERMINAL UI AUTOMATION</text>

  <!-- 底部装饰线 -->
  <line x1="80" y1="390" x2="432" y2="390" stroke="#00ff41" stroke-width="0.8" stroke-opacity="0.25"/>

  <!-- 底部功能标签 -->
  <text x="256" y="416"
        text-anchor="middle"
        font-family="'Courier New', monospace"
        font-size="13" fill="#2d6e3e" letter-spacing="2">start · capture · type · click</text>

  <!-- 版本 badge -->
  <rect x="206" y="436" width="100" height="22" rx="5" fill="#00ff41" opacity="0.12" stroke="#00ff41" stroke-width="1" stroke-opacity="0.5"/>
  <text x="256" y="452" text-anchor="middle"
        font-family="'Courier New', monospace"
        font-size="12" fill="#00ff41" letter-spacing="1">v1.0.0</text>

  <!-- 底部点阵装饰 -->
  <circle cx="90" cy="474" r="2.5" fill="#00ff41" opacity="0.4"/>
  <circle cx="102" cy="474" r="2.5" fill="#00ff41" opacity="0.3"/>
  <circle cx="114" cy="474" r="2.5" fill="#00ff41" opacity="0.2"/>
  <circle cx="398" cy="474" r="2.5" fill="#00ff41" opacity="0.2"/>
  <circle cx="410" cy="474" r="2.5" fill="#00ff41" opacity="0.3"/>
  <circle cx="422" cy="474" r="2.5" fill="#00ff41" opacity="0.4"/>
</svg>
